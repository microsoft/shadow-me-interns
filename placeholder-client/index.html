<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intern Support</title>
  </head>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100dvh;
      width: 100dvw;
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #242424;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 24px;
      max-width: 520px;
      text-align: center;
    }

    h1 {
      color: #0078d4;
      margin: 0;
      font-size: 2rem;
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: #444;
    }

    .repo-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px 16px;
      width: 100%;
      box-sizing: border-box;
    }

    .repo-box a {
      flex: 1;
      color: #0078d4;
      text-decoration: none;
      font-size: 14px;
      word-break: break-all;
      text-align: left;
    }

    .repo-box a:hover {
      text-decoration: underline;
    }

    .copy-btn {
      background: none;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 6px 8px;
      cursor: pointer;
      color: #444;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .copy-btn:hover {
      background: #f0f0f0;
    }

    .copy-btn svg {
      width: 18px;
      height: 18px;
    }
  </style>
  <body>
    <div class="page">
      <h1>Intern Support</h1>

      <p>
        This site is not approved for public use due to security reasons. If you
        are interested in this project, you can help by starring the GitHub
        repository to show your support.
      </p>

      <div class="repo-box">
        <a
          href="https://github.com/microsoft/intern-support"
          target="_blank"
          rel="noopener noreferrer"
          id="repoUrl"
          >https://github.com/microsoft/intern-support</a
        >
        <button
          class="copy-btn"
          onclick="
            navigator.clipboard.writeText(
              document.getElementById('repoUrl').href,
            )
          "
          title="Copy link"
        >
          <svg viewBox="0 0 16 16" fill="currentColor">
            <path
              d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"
            />
            <path
              d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"
            />
          </svg>
        </button>
      </div>
    </div>
  </body>
</html>
